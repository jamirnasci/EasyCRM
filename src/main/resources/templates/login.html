<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | EasyCRM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
            border: none;
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        .brand-logo {
            font-weight: 700;
            font-size: 1.5rem;
            color: #0d6efd;
            letter-spacing: -1px;
        }
        .btn-primary {
            padding: 0.6rem;
            font-weight: 600;
            border-radius: 0.5rem;
        }
        .form-control {
            padding: 0.75rem;
            border-radius: 0.5rem;
        }
        .form-control:focus {
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.15);
        }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center">
    <div class="card login-card bg-white">
        <div class="text-center mb-4">
            <div class="brand-logo mb-1">EasyCRM</div>
            <p class="text-muted small">Gerencie seu negócio com facilidade.</p>
        </div>

        <form action="/login" method="post">
            <div class="mb-3">
                <label for="email" class="form-label small fw-bold">E-mail</label>
                <input type="email" class="form-control" name="email" id="email" placeholder="nome@exemplo.com" required>
            </div>
            
            <div class="mb-3">
                <div class="d-flex justify-content-between">
                    <label for="password" class="form-label small fw-bold">Senha</label>
                    <a href="#" class="text-decoration-none small">Esqueceu a senha?</a>
                </div>
                <input type="password" class="form-control" name="password" id="password" placeholder="••••••••" required>
            </div>

            <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" id="remember">
                <label class="form-check-label small" for="remember">Lembrar de mim</label>
            </div>

            <button type="submit" class="btn btn-primary w-100 mb-3">Entrar</button>

            <div class="text-center">
                <p class="small text-muted">Não tem uma conta? <a href="/usuario/cadastro" class="text-decoration-none">Cadastre-se</a></p>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
