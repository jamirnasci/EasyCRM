<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes</title>
    <th:block th:replace="~{partials/headers :: headers}"></th:block>
    <link rel="stylesheet" th:href="@{/css/global.css}">
</head>

<body>

    <div th:replace="~{partials/sideBar :: sideBar}"></div>
    <div class="container-fluid pt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="h4 fw-bold">Gestão de Clientes</h2>
            <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalCadastroCliente">
                <i class="fa-solid fa-plus me-2"></i>Novo Cliente
            </button>
        </div>

        <div class="card border-0 shadow-sm mb-4">
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-10">
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0">
                                <i class="fa-solid fa-magnifying-glass text-muted"></i>
                            </span>
                            <input type="text" class="form-control border-start-0"
                                placeholder="Pesquisar por nome, CPF ou e-mail..." id="search">
                        </div>
                    </div>
                    <div class="col-md-2">
                        <button class="btn btn-outline-secondary w-100" onClick="searchHandler()">Filtrar</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="card border-0 shadow-sm">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="bg-light">
                            <tr>
                                <th class="ps-4">Nome</th>
                                <th>E-mail</th>
                                <th>Telefone</th>
                                <th>Status</th>
                                <th class="text-end pe-4">Ações</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr class="text-secondary" th:if="${customers.empty}">
                                <td colspan="5" class="text-center">Nenhum cliente encontrado.</td>
                            </tr>
                            <tr th:each="c : ${customers}">
                                <td class="ps-4">
                                    <div class="fw-bold" th:text="${c.name}"></div>
                                    <small class="text-muted" th:text="'CPF: ' + ${c.cpf}"></small>
                                </td>
                                <td th:text="${c.email}"></td>
                                <td th:text="${c.phone}"></td>
                                <td>
                                <span class="badge rounded-pill"
                                    th:classappend="${
                                        c.status?.name() == 'LEAD' ? 'bg-info' :
                                        c.status?.name() == 'CONTATADO' ? 'bg-warning text-dark' :
                                        c.status?.name() == 'CONVERTIDO' ? 'bg-success' :
                                        c.status?.name() == 'QUALIFICADO' ? 'bg-primary' : 'bg-danger'}"
                                    th:text="${c.status}">
                                    Status
                                </span>
                                </td>
                                <td class="text-end pe-4">
                                    <a class="btn btn-sm btn-light text-primary"
                                        th:href="'/clientes/update/' + ${c.idcustomer}">
                                        <i class="fa-solid fa-pen"></i>
                                    </a>
                                    <button class="btn btn-sm btn-light text-danger" th:customername="${c.name}"
                                        th:idcustomer="${c.idcustomer}" onClick="deleteHandler(this)">
                                        <i class="fa-solid fa-trash"></i>
                                    </button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalCadastroCliente" tabindex="-1" aria-labelledby="modalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content border-0 shadow">
                <div class="modal-header border-bottom-0 pt-4 px-4">
                    <h5 class="modal-title fw-bold" id="modalLabel">Cadastrar Novo Cliente</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <form action="/clientes/create" method="post" id="formCliente">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label small fw-bold">Nome Completo</label>
                                <input type="text" class="form-control" name="name" placeholder="Ex: Maria Oliveira"
                                    required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-bold">E-mail</label>
                                <input type="email" class="form-control" name="email" placeholder="maria@email.com"
                                    required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-bold">Telefone/WhatsApp</label>
                                <input type="tel" class="form-control" name="phone" placeholder="(00) 00000-0000">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-bold">CPF/CNPJ</label>
                                <input type="text" class="form-control" name="cpf" placeholder="000.000.000-00"
                                    maxLength="11">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-bold">Status</label>
                                <select class="form-select" name="status">
                                    <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}"></option>
                                </select>
                            </div>
                            <div class="col-12">
                                <label class="form-label small fw-bold">Descrição</label>
                                <textarea rows="5" class="form-control" name="description"
                                    placeholder="Rua, Número, Bairro..."></textarea>
                            </div>
                            <div class="col-12 mt-4">
                                <hr>
                                <div class="d-flex justify-content-end gap-2">
                                    <button type="button" class="btn btn-light"
                                        data-bs-dismiss="modal">Cancelar</button>
                                    <button type="submit" class="btn btn-primary px-4">Salvar Cliente</button>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
<script th:src="@{/js/clientes.js}"></script>

</html>
