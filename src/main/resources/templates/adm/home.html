<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adm</title>
    <th:block th:replace="~{partials/headers :: headers}"></th:block>
    <link rel="stylesheet" th:href="@{/css/global.css}">
</head>

<body>

    <div th:replace="~{partials/sideBar :: sideBar}"></div>
    <div class="container-fluid pt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="h4 fw-bold">Seção do Administrador</h2>
            <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalCadastroCliente">
                <i class="fa-solid fa-plus me-2"></i>Novo Usuário
            </button>
        </div>

        <div class="card border-0 shadow-sm mb-4">
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-10">
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0">
                                <i class="fa-solid fa-magnifying-glass text-muted"></i>
                            </span>
                            <input type="text" class="form-control border-start-0"
                                placeholder="Pesquisar por nome, CPF ou e-mail..." id="search">
                        </div>
                    </div>
                    <div class="col-md-2">
                        <button class="btn btn-outline-secondary w-100" onClick="searchHandler()">Filtrar</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="card border-0 shadow-sm">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="bg-light">
                            <tr>
                                <th class="ps-4">Nome</th>
                                <th>E-mail</th>
                                <th>Telefone</th>
                                <th>Status</th>
                                <th class="text-end pe-4">Ações</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="user : ${users}">
                                <td class="ps-4">
                                    <div class="fw-bold" th:text="${user.name}"></div>
                                    <small class="text-muted" th:text="'CPF: ' + ${user.cpf}"></small>
                                </td>
                                <td th:text="${user.email}"></td>
                                <td th:text="${user.phone}"></td>
                                <td>
                                    <span th:text="${user.status}"
                                        th:class="'badge rounded-pill ' + (${user.status.name()} == 'ATIVO' ? 'bg-success' : 'bg-danger')">
                                    </span>
                                </td>
                                <td class="text-end pe-4">
                                    <a class="btn btn-sm btn-light text-primary"
                                        th:href="'/adm/usuario/update/' + ${user.iduser}">
                                        <i class="fa-solid fa-pen"></i>
                                    </a>
                                    <button class="btn btn-sm btn-light text-danger" th:username="${user.name}"
                                        th:iduser="${user.iduser}" onClick="deleteHandler(this)">
                                        <i class="fa-solid fa-trash"></i>
                                    </button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalCadastroCliente" tabindex="-1" aria-labelledby="modalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content border-0 shadow">
                <div class="modal-header border-bottom-0 pt-4 px-4">
                    <h5 class="modal-title fw-bold" id="modalLabel">Cadastrar Novo Usuário</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <form action="/usuario/cadastro" method="post" enctype="multipart/form-data">

                        <div class="row g-3">

                            <!-- Nome -->
                            <div class="col-md-6">
                                <label class="form-label">Nome</label>
                                <input type="text" name="name" class="form-control" required>
                            </div>

                            <!-- Telefone -->
                            <div class="col-md-6">
                                <label class="form-label">Telefone</label>
                                <input type="tel" class="form-control" name="phone" required>
                            </div>

                            <!-- CPF -->
                            <div class="col-md-6">
                                <label class="form-label">CPF</label>
                                <input type="text" class="form-control" name="cpf" maxlength="11" required>
                            </div>

                            <!-- Email -->
                            <div class="col-md-6">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control" name="email" required>
                            </div>

                            <!-- Senha -->
                            <div class="col-md-6">
                                <label class="form-label">Senha</label>
                                <input type="password" class="form-control" name="password" required>
                            </div>

                            <!-- Role -->
                            <div class="col-md-6">
                                <label class="form-label">Perfil</label>
                                <select class="form-select" name="role">
                                    <option value="">Selecione</option>
                                    <option th:each="r : ${roles}" th:value="${r}" th:text="${r}">
                                    </option>
                                </select>
                            </div>

                            <!-- Status -->
                            <div class="col-md-6">
                                <label class="form-label">Status</label>
                                <select class="form-select" name="status">
                                    <option value="">Selecione</option>
                                    <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}">
                                    </option>
                                </select>
                            </div>

                            <!-- Img URL -->
                            <div class="col-12">
                                <label class="form-label">URL da Imagem</label>
                                <input type="file" class="form-control" name="imgFile">
                            </div>

                            <!-- Botões -->
                            <div class="col-12 mt-4">
                                <button type="submit" class="btn btn-primary">
                                    Salvar
                                </button>
                                <a href="/users" class="btn btn-secondary">Cancelar</a>
                            </div>

                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>
    <div id="msg" th:if="${error}" th:data-msg="${error}"></div>
    <script th:src="@{/js/msgHandler.js}"></script>
    <script th:src="@{/js/clientes.js}"></script>
</body>

</html>
