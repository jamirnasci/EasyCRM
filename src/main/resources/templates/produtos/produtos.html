<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="h4 fw-bold">Gestão de Produtos</h2>
        <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalCadastroProduto">
            <i class="fa-solid fa-plus me-2"></i>Novo Produto
        </button>
    </div>

    <div class="card border-0 shadow-sm mb-4">
        <div class="card-body">
            <div class="row g-3">
                <div class="col-md-8">
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0">
                            <i class="fa-solid fa-magnifying-glass text-muted"></i>
                        </span>
                        <input type="text" class="form-control border-start-0" placeholder="Pesquisar por nome, SKU ou categoria...">
                    </div>
                </div>
                <div class="col-md-4 text-end">
                    <select class="form-select d-inline-block w-auto me-2">
                        <option selected>Categoria</option>
                        <option>Eletrônicos</option>
                        <option>Serviços</option>
                        <option>Software</option>
                    </select>
                    <button class="btn btn-outline-secondary">Filtrar</button>
                </div>
            </div>
        </div>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="bg-light">
                        <tr>
                            <th class="ps-4">Produto</th>
                            <th>Categoria</th>
                            <th>Preço</th>
                            <th>Estoque</th>
                            <th class="text-end pe-4">Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td class="ps-4">
                                <div class="fw-bold">Licença EasyCRM Pro</div>
                                <small class="text-muted">SKU: CRM-PRO-01</small>
                            </td>
                            <td><span class="badge bg-info text-dark">Software</span></td>
                            <td>R$ 499,90</td>
                            <td><span class="text-success fw-bold">99+</span></td>
                            <td class="text-end pe-4">
                                <button class="btn btn-sm btn-light text-primary"><i class="fa-solid fa-pen"></i></button>
                                <button class="btn btn-sm btn-light text-danger"><i class="fa-solid fa-trash"></i></button>
                            </td>
                        </tr>
                        <tr>
                            <td class="ps-4">
                                <div class="fw-bold">Consultoria Técnica</div>
                                <small class="text-muted">SKU: SRV-CONS-01</small>
                            </td>
                            <td><span class="badge bg-secondary">Serviços</span></td>
                            <td>R$ 150,00/h</td>
                            <td><span class="text-muted">—</span></td>
                            <td class="text-end pe-4">
                                <button class="btn btn-sm btn-light text-primary"><i class="fa-solid fa-pen"></i></button>
                                <button class="btn btn-sm btn-light text-danger"><i class="fa-solid fa-trash"></i></button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalCadastroProduto" tabindex="-1" aria-labelledby="modalLabelProd" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content border-0 shadow">
            <div class="modal-header border-bottom-0 pt-4 px-4">
                <h5 class="modal-title fw-bold" id="modalLabelProd">Cadastrar Novo Produto</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-4">
                <form id="formProduto">
                    <div class="row g-3">
                        <div class="col-md-8">
                            <label class="form-label small fw-bold">Nome do Produto/Serviço</label>
                            <input type="text" class="form-control" placeholder="Ex: Planilha de Automação" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small fw-bold">Código (SKU)</label>
                            <input type="text" class="form-control" placeholder="PROD-001">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small fw-bold">Categoria</label>
                            <select class="form-select">
                                <option selected>Selecione...</option>
                                <option>Software</option>
                                <option>Automação</option>
                                <option>Serviços</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small fw-bold">Preço de Venda (R$)</label>
                            <input type="number" step="0.01" class="form-control" placeholder="0,00">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small fw-bold">Estoque Inicial</label>
                            <input type="number" class="form-control" placeholder="0">
                        </div>
                        <div class="col-12">
                            <label class="form-label small fw-bold">Descrição</label>
                            <textarea class="form-control" rows="3" placeholder="Detalhes técnicos ou especificações..."></textarea>
                        </div>
                        <div class="col-12 mt-4">
                            <hr>
                            <div class="d-flex justify-content-end gap-2">
                                <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancelar</button>
                                <button type="submit" class="btn btn-primary px-4">Salvar Produto</button>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
