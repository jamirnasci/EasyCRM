<!DOCTYPE html>
<html lang="pt-br">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Produtos</title>
	<th:block th:replace="~{partials/headers :: headers}"></th:block>
	<link rel="stylesheet" th:href="@{/css/global.css}">
</head>

<body>
	<div th:replace="~{partials/sideBar :: sideBar}"></div>
	<div class="container-fluid pt-4">
		<div class="d-flex justify-content-between align-items-center mb-4">
			<h2 class="h4 fw-bold">Gestão de Produtos</h2>
			<button sec:authorize="hasRole('ADM')" type="button" class="btn btn-primary" data-bs-toggle="modal"
				data-bs-target="#modalCadastroProduto">
				<i class="fa-solid fa-plus me-2"></i>Novo Produto
			</button>
		</div>

		<div class="card border-0 shadow-sm mb-4">
			<div class="card-body">
				<div class="row g-3">
					<div class="col-md-8">
						<div class="input-group">
							<span class="input-group-text bg-white border-end-0">
								<i class="fa-solid fa-magnifying-glass text-muted"></i>
							</span>
							<input id="search" type="text" class="form-control border-start-0"
								placeholder="Digite o nome do produto">
						</div>
					</div>
					<div class="col-md-4 text-end">
						<select class="form-select d-inline-block w-auto me-2" id="category">
							<option value="" selected>Selecione uma categoria</option>
							<option th:each="cat : ${categories}" th:value="${cat}" th:text="${cat}">Categoria</option>
						</select>
						<button class="btn btn-outline-secondary" id="filterBtn">Filtrar</button>
					</div>
				</div>
			</div>
		</div>

		<div class="card border-0 shadow-sm">
			<div class="card-body p-0">
				<div class="table-responsive">
					<table class="table table-hover align-middle mb-0">
						<thead class="bg-light">
							<tr>
								<th class="ps-4">Produto</th>
								<th>Categoria</th>
								<th>Preço</th>
								<th>Estoque</th>
								<th class="text-end pe-4">Ações</th>
							</tr>
						</thead>
						<tbody>
							<tr th:each="p : ${products}">
								<td class="ps-4 d-flex align-items-center">
									<img th:src="${p.imgUrl}" alt="" style="height: 100px;">
									<div class="ms-1">
										<div class="fw-bold ms-2" th:text="${p.name}"></div>
										<small class="text-muted"></small>
									</div>
								</td>
								<td><span class="badge bg-info text-dark" th:text="${p.category}"></span></td>
								<td class="fw-bold text-dark" th:text="${#numbers.formatCurrency(p.price)}"></td>
								<td><span class="text-success fw-bold" th:text="${p.quantity}"></span></td>
								<td class="text-end pe-4">
									<div>
										<span th:if="${#authentication.principal.user.role.name() == 'ADM'}">

											<a class="btn btn-sm btn-light text-primary"
												th:href="'/produtos/update/' + ${p.idproduct}">
												<i class="fa-solid fa-pen"></i>
											</a>
											<button class="btn btn-sm btn-light text-danger" th:productname="${p.name}"
												th:idproduct="${p.idproduct}" onClick="deleteHandler(this)">
												<i class="fa-solid fa-trash"></i>
											</button>
										</span>
										<a class="btn btn-sm btn-primary text-light"
											th:href="'/produtos/details/' + ${p.idproduct}">
											<i class="fa-solid fa-arrow-right-to-bracket"></i>
										</a>
									</div>
								</td>
							</tr>
						</tbody>
					</table>
				</div>
			</div>
		</div>
	</div>

	<div class="modal fade" id="modalCadastroProduto" tabindex="-1" aria-labelledby="modalLabelProd" aria-hidden="true">
		<div class="modal-dialog modal-lg">
			<div class="modal-content border-0 shadow">
				<div class="modal-header border-bottom-0 pt-4 px-4">
					<h5 class="modal-title fw-bold" id="modalLabelProd">Cadastrar Novo Produto</h5>
					<button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
				</div>
				<div class="modal-body p-4">
					<form action="/produtos/create" method="POST" id="formProduto" enctype="multipart/form-data">
						<div class="row g-3">
							<div class="col-md-8">
								<label class="form-label small fw-bold">Nome do Produto/Serviço</label>
								<input type="text" class="form-control" name="name"
									placeholder="Ex: Planilha de Automação" required>
							</div>
							<div class="col-md-4">
								<label class="form-label small fw-bold">Preço de Venda (R$)</label>
								<input type="number" name="price" step="0.01" class="form-control" placeholder="0,00">
							</div>
							<div class="col-md-4">
								<label class="form-label small fw-bold">Estoque</label>
								<input type="number" name="quantity" class="form-control" placeholder="0" min="0">
							</div>
							<div class="col-md-4">
								<label class="form-label small fw-bold">Categoria</label>
								<select name="category" class="form-select" required>
									<option value="" selected>Selectione uma categoria</option>
									<option th:each="c : ${categories}" th:value="${c}" th:text="${c}"></option>
								</select>
							</div>
							<div class="col-12">
								<label class="form-label small fw-bold">Imagem</label>
								<input class="form-control" type="file" name="imgFile" />
							</div>
							<div class="col-12">
								<label class="form-label small fw-bold">Descrição</label>
								<textarea class="form-control" name="description" rows="3"
									placeholder="Detalhes técnicos ou especificações..."></textarea>
							</div>
							<div class="col-12 mt-4">
								<hr>
								<div class="d-flex justify-content-end gap-2">
									<button type="button" class="btn btn-light"
										data-bs-dismiss="modal">Cancelar</button>
									<button type="submit" class="btn btn-primary px-4">Salvar Produto</button>
								</div>
							</div>
						</div>
					</form>
				</div>
			</div>
		</div>
	</div>
	<div id="msg" th:if="${error}" th:data-msg="${error}"></div>
	<script th:src="@{/js/msgHandler.js}"></script>
	<script th:src="@{/js/produtos.js}"></script>

</body>

</html>
