<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes do Produto</title>
    <th:block th:replace="~{partials/headers :: headers}"></th:block>
    <link rel="stylesheet" th:href="@{/css/global.css}">
</head>

<body>
    <div th:replace="~{partials/sideBar :: sideBar}"></div>

    <div class="container-fluid pt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="h4 fw-bold">Detalhes do Produto</h2>
        </div>

        <div class="card shadow-sm p-4">
            <div class="row g-4 align-items-center">
                
                <!-- Imagem -->
                <div class="col-md-3 text-center">
                    <img th:src="${p.imgUrl}" alt="Imagem do Produto"
                        class="rounded-circle"
                        style="width:150px; height:150px; object-fit:cover;">
                </div>

                <!-- Informações -->
                <div class="col-md-9">
                    <div class="row g-3">

                        <div class="col-md-6">
                            <label class="form-label small fw-bold text-muted">Nome</label>
                            <div id="p-name" class="form-control-plaintext fw-semibold" th:text="${p.name}"></div>
                        </div>

                        <div class="col-md-3">
                            <label class="form-label small fw-bold text-muted">Preço</label>
                            <div id="p-price" class="form-control-plaintext"
                                 th:text="${'R$ ' + #numbers.formatDecimal(p.price, 1, 'POINT', 2, 'COMMA')}"></div>
                        </div>

                        <div class="col-md-3">
                            <label class="form-label small fw-bold text-muted">Estoque</label>
                            <div id="p-quantity" class="form-control-plaintext" th:text="${p.quantity}"></div>
                        </div>

                        <div class="col-md-4">
                            <label class="form-label small fw-bold text-muted">Categoria</label>
                            <div id="p-category" class="form-control-plaintext" th:text="${p.category}"></div>
                        </div>

                        <div class="col-12">
                            <label class="form-label small fw-bold text-muted">Descrição</label>
                            <div id="p-description" class="form-control-plaintext"
                                 th:text="${p.description != null ? p.description : 'Sem descrição'}"></div>
                        </div>

                    </div>
                </div>
            </div>

            <hr class="my-4">

            <!-- Ações -->
            <div class="d-flex justify-content-end gap-2">
                <a href="/produtos" class="btn btn-light">Voltar</a>
                <button id="copyProductDetailsBtn"  class="btn btn-primary">
                    Copiar informações
                </button>
            </div>
        </div>
    </div>
<script th:src="@{/js/produtoDetalhes.js}"></script>
</body>
</html>
