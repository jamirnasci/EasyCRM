<!DOCTYPE html>
<html lang="pt-br">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Vendas</title>
	<th:block th:replace="~{partials/headers :: headers}"></th:block>
	<link rel="stylesheet" th:href="@{/css/global.css}">
</head>

<body>
	<div th:replace="~{partials/sideBar :: sideBar}"></div>
	<div class="container-fluid p-4">
		<div class="d-flex justify-content-between align-items-center">
			<h2 class="h4 fw-bold">Gestão de Vendas</h2>
			<button type="button" class="btn btn-success" data-bs-toggle="modal" data-bs-target="#modalNovaVenda">
				<i class="fa-solid fa-cart-plus me-2"></i>Nova Venda
			</button>
		</div>

		<div class="row mb-2">
			<div class="row align-items-end mb-2">
				<div class="col-md-3">
					<label class="form-label small fw-bold text-muted">Data Inicial</label>
					<input type="date" class="form-control" id="date1" th:value="${d1 == null ? '' : d1}">
				</div>
				<div class="col-md-3">
					<label class="form-label small fw-bold text-muted">Data Final</label>
					<input type="date" class="form-control" id="date2" th:value="${d2 == null ? '' : d2}">
				</div>
				<div class="col-md-2">
					<label for=""> </label>
					<button class="btn btn-outline-primary w-100 m-0" id="filterBtn">
						<i class="fa-solid fa-filter me-2"></i>Filtrar
					</button>
				</div>
			</div>
			<div class="col-md-4">
				<div class="card border-0 shadow-sm p-3">
					<div class="d-flex align-items-center">
						<div class="bg-primary bg-opacity-10 p-3 rounded-circle me-3">
							<i class="fa-solid fa-hand-holding-dollar text-primary fs-4"></i>
						</div>
						<div>
							<small class="text-muted d-block">Total em Vendas</small>
							<span class="fw-bold h5 mb-0" th:text="${#numbers.formatCurrency(total)}"></span>
						</div>
					</div>
				</div>
			</div>
			<div class="col-md-4">
				<div class="card border-0 shadow-sm p-3">
					<div class="d-flex align-items-center">
						<div class="bg-success bg-opacity-10 p-3 rounded-circle me-3">
							<i class="fa-solid fa-check text-success fs-4"></i>
						</div>
						<div>
							<small class="text-muted d-block">Vendas Finalizadas</small>
							<span class="fw-bold h5 mb-0" th:text="${finalizadaCount}"></span>
						</div>
					</div>
				</div>
			</div>
			<div class="col-md-4">
				<div class="card border-0 shadow-sm p-3">
					<div class="d-flex align-items-center">
						<div class="bg-warning bg-opacity-10 p-3 rounded-circle me-3">
							<i class="fa-solid fa-clock text-warning fs-4"></i>
						</div>
						<div>
							<small class="text-muted d-block">Em negociação</small>
							<span class="fw-bold h5 mb-0" th:text="${negociacaoCount}"></span>
						</div>
					</div>
				</div>
			</div>
		</div>

		<div class="card border-0 shadow-sm">
			<div class="card-header bg-white border-bottom-0 pt-3 ps-4">
				<h6 class="fw-bold mb-0">Últimas Transações</h6>
			</div>
			<div class="card-body p-0">
				<div class="table-responsive">
					<table class="table table-hover align-middle mb-0">
						<thead class="bg-light">
							<tr>
								<th class="ps-4">ID / Data</th>
								<th>Cliente</th>
								<th>Total</th>
								<th>Status</th>
								<th class="text-end pe-4">Ações</th>
							</tr>
						</thead>
						<tbody>
							<tr th:each="sale : ${sales}">
								<td class="ps-4">
									<div class="fw-bold" th:text="${sale.idsale}"></div>
									<small class="text-muted"
										th:text="${#temporals.format(sale.createdAt, 'dd/MM/yyyy hh:mm')}"></small>
								</td>
								<td th:text="${sale.customer.name}"></td>
								<td class="fw-bold text-dark" th:text="'R$ ' + ${sale.total}"></td>
								<td>
									<span 
										th:class="'badge rounded-pill badge-pill ' + 
										(${sale.status.name() == 'FINALIZADA'} ? 'bg-success' : 
										(${sale.status.name() == 'EM_NEGOCIACAO'} ? 'bg-warning text-dark' : 'bg-danger'))"
										th:text="${sale.status}">
									</span>
								</td>
								<td class="text-end pe-4">
									<button class="btn btn-sm btn-light" title="Ver Recibo"><i
											class="fa-solid fa-file-invoice-dollar"></i></button>
									<a class="btn btn-sm btn-light text-primary"
										th:href="'/vendas/update/' + ${sale.idsale}"><i class="fa-solid fa-pen"></i></a>
								</td>
							</tr>
						</tbody>
					</table>
				</div>
			</div>
		</div>
	</div>

	<div class="modal fade" id="modalNovaVenda" tabindex="-1" aria-hidden="true">
		<div class="modal-dialog modal-lg">
			<div class="modal-content border-0 shadow">
				<div class="modal-header border-bottom-0 pt-4 px-4">
					<h5 class="modal-title fw-bold">Registrar Nova Venda</h5>
					<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
				</div>
				<div class="modal-body p-4">
					<form id="formVenda" action="/vendas/create" method="POST">
						<div class="row g-3">
							<div class="col-md-12">
								<label class="form-label small fw-bold">Selecionar Cliente</label>
								<select class="form-select" name="customer" required>
									<option selected disabled>Escolha um cliente...</option>
									<option th:each="c: ${customers}" th:text="${c.cpf + ' - ' + c.name}" th:value="${c.idcustomer}">
									</option>
								</select>
							</div>
							<div class="col-12">
								<label class="form-label small fw-bold">Adicionar Produtos</label>
								<div class="input-group">
									<select class="form-select" id="productsSelect" name="product">
										<option selected disabled>Selecione o produto...</option>
										<option th:each="p : ${products}" th:text="${p.name}" th:value="${p.idproduct}">
										</option>
									</select>
									<input type="number" class="form-control w-25" placeholder="Qtd" value="1" min="1"
										id="quantity" name="quantity">
									<button class="btn btn-outline-primary" type="button" id="calcBtn">Calcular</button>
								</div>
							</div>
							<div class="col-md-6">
								<label class="form-label small fw-bold">Forma de Pagamento</label>
								<select class="form-select" name="paymentMethod">
									<option th:each="pm : ${paymentMethods}" th:text="${pm}" th:value="${pm}"></option>
								</select>
							</div>
							<div class="col-md-6">
								<label class="form-label small fw-bold">Status Inicial</label>
								<select class="form-select" name="status">
									<option th:each="ss : ${saleStatus}" th:text="${ss}" th:value="${ss}"></option>
								</select>
							</div>
							<div class="col-12 mt-4">
								<div class="bg-light p-3 rounded d-flex justify-content-between align-items-center">
									<span class="fw-bold">Valor Total Estimado:</span>
									<span class="d-flex align-items-center h3 mb-0 text-primary fw-bold">R$ <input
											style="font-size: 0.8em; font-weight: bold; text-align: right;"
											type="number" class="form-control m-1 text-primary" id="valorFinal"
											name="total" step="0.01" disabled></span>
								</div>
							</div>
							<div class="col-12 mt-4 d-flex justify-content-end gap-2">
								<button type="button" class="btn btn-light" data-bs-dismiss="modal">Descartar</button>
								<button type="submit" class="btn btn-success px-4">Finalizar Venda</button>
							</div>
						</div>
					</form>
				</div>
			</div>
		</div>
	</div>
	<div id="msg" th:if="${error}" th:data-msg="${error}"></div>
    <script th:src="@{/js/msgHandler.js}"></script>
	<script th:src="@{/js/vendas.js}"></script>
</body>

</html>
