<!DOCTYPE html>
<html lang="pt-br">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Clientes</title>
	<th:block th:replace="~{partials/headers :: headers}"></th:block>
	<link rel="stylesheet" th:href="@{/css/global.css}">
</head>

<body>
	<div th:replace="~{partials/sideBar :: sideBar}"></div>
	<div class="container-fluid pt-4">
		<div class="d-flex justify-content-between align-items-center mb-4">
			<h2 class="h4 fw-bold">Interações e Follow-ups</h2>
			<button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalNovaInteracao">
				<i class="fa-solid fa-calendar-plus me-2"></i>Nova Interação
			</button>
		</div>

		<div class="card border-0 shadow-sm mb-4">
			<div class="card-body">
				<div class="row g-3 align-items-end">
					<div class="col-md-3">
						<label class="form-label small fw-bold text-muted">Data Inicial</label>
						<input type="date" class="form-control" id="date1">
					</div>
					<div class="col-md-3">
						<label class="form-label small fw-bold text-muted">Data Final</label>
						<input type="date" class="form-control" id="date2">
					</div>
					<div class="col-md-4">
						<label class="form-label small fw-bold text-muted">Status</label>
						<select class="form-select" id="status">
							<option value="" selected>Todos</option>
							<option th:each="s : ${statuses}" th:value="${s}" th:text="${s}"></option>
						</select>
					</div>
					<div class="col-md-2">
						<button class="btn btn-outline-primary w-100" id="filterBtn">
							<i class="fa-solid fa-filter me-2"></i>Filtrar
						</button>
					</div>
				</div>
			</div>
		</div>

		<div class="card border-0 shadow-sm">
			<div class="card-body p-0">
				<div class="table-responsive">
					<table class="table table-hover align-middle mb-0">
						<thead class="bg-light">
							<tr>
								<th class="ps-4">Data/Hora</th>
								<th>Cliente</th>
								<th>Tipo</th>
								<th>Assunto/Notas</th>
								<th>Status</th>
								<th class="text-end pe-4">Ações</th>
							</tr>
						</thead>
						<tbody>
							<td th:if="${#lists.isEmpty(interactions)}">Nenhum registro encontrado</td>
							<tr th:each="in : ${interactions}">
								<td class="ps-4">
									<div class="fw-bold" th:text="${#temporals.format(in.date, 'dd/MM/yyyy')}"></div>
									<small class="text-muted" th:text="${in.time}"></small>
								</td>
								<td th:text="${in.customer.name}"></td>
								<td>
									<span th:text="${in.type}" class="badge bg-light text-primary border"></span>
								</td>
								<td>
									<div th:text="${in.description}" class="text-truncate" style="max-width: 250px;">
									</div>
								</td>
								<td><span th:text="${in.status}" class="badge bg-warning text-dark"></span></td>
								<td class="text-end pe-4">
									<button class="btn btn-sm btn-outline-success" title="Concluir"><i
											class="fa-solid fa-check"></i></button>
									<button class="btn btn-sm btn-light text-primary"><i
											class="fa-solid fa-pen"></i></button>
								</td>
							</tr>
						</tbody>
					</table>
				</div>
			</div>
		</div>
	</div>

	<div class="modal fade" id="modalNovaInteracao" tabindex="-1" aria-hidden="true">
		<div class="modal-dialog modal-md">
			<div class="modal-content border-0 shadow">
				<div class="modal-header border-bottom-0 pt-4 px-4">
					<h5 class="modal-title fw-bold">Agendar Interação</h5>
					<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
				</div>
				<div class="modal-body p-4">
					<form id="formInteracao" action="/interacoes/create" method="POST">
						<div class="row g-3">
							<div class="col-12">
								<label class="form-label small fw-bold">Cliente</label>
								<select class="form-select" name="customer" required>
									<option selected disabled>Selecionar cliente...</option>
									<option th:each="c : ${customers}" th:value="${c.idcustomer}" th:text="${c.name}">
										João Silva</option>
								</select>
							</div>
							<div class="col-md-6">
								<label class="form-label small fw-bold">Data</label>
								<input type="date" name="date" class="form-control" value="2026-04-24">
							</div>
							<div class="col-md-6">
								<label class="form-label small fw-bold">Horário</label>
								<input type="time" name="time" class="form-control" value="14:30">
							</div>
							<div class="col-12">
								<label class="form-label small fw-bold">Tipo de interação</label>
								<select class="form-select" name="type" required>
									<option selected disabled>Selecionar ...</option>
									<option th:each="t : ${types}" th:value="${t}" th:text="${t}"></option>
								</select>
							</div>
							<div class="col-12">
								<label class="form-label small fw-bold">Status</label>
								<select class="form-select" name="status" required>
									<option selected disabled>Selecionar ...</option>
									<option th:each="s : ${statuses}" th:value="${s}" th:text="${s}"></option>
								</select>
							</div>
							<div class="col-12">
								<label class="form-label small fw-bold">Notas / Objetivo</label>
								<textarea class="form-control" name="description" rows="3"
									placeholder="O que será discutido?"></textarea>
							</div>
							<div class="col-12 mt-4 d-flex justify-content-end gap-2">
								<button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancelar</button>
								<button type="submit" class="btn btn-primary px-4">Agendar</button>
							</div>
						</div>
					</form>
				</div>
			</div>
		</div>
	</div>
	<script th:src="@{/js/interacoes.js}"></script>
</body>
</html>
