<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>


<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="h4 fw-bold">Interações e Follow-ups</h2>
        <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalNovaInteracao">
            <i class="fa-solid fa-calendar-plus me-2"></i>Nova Interação
        </button>
    </div>

    <div class="card border-0 shadow-sm mb-4">
        <div class="card-body">
            <form class="row g-3 align-items-end">
                <div class="col-md-3">
                    <label class="form-label small fw-bold text-muted">Data Inicial</label>
                    <input type="date" class="form-control" value="2026-04-23">
                </div>
                <div class="col-md-3">
                    <label class="form-label small fw-bold text-muted">Data Final</label>
                    <input type="date" class="form-control" value="2026-04-30">
                </div>
                <div class="col-md-4">
                    <label class="form-label small fw-bold text-muted">Tipo de Interação</label>
                    <select class="form-select">
                        <option selected>Todos os tipos</option>
                        <option>Reunião</option>
                        <option>Chamada Telefônica</option>
                        <option>E-mail / WhatsApp</option>
                        <option>Demonstração</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-outline-primary w-100">
                        <i class="fa-solid fa-filter me-2"></i>Filtrar
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="bg-light">
                        <tr>
                            <th class="ps-4">Data/Hora</th>
                            <th>Cliente</th>
                            <th>Tipo</th>
                            <th>Assunto/Notas</th>
                            <th>Status</th>
                            <th class="text-end pe-4">Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td class="ps-4">
                                <div class="fw-bold">24/04/2026</div>
                                <small class="text-muted">14:30</small>
                            </td>
                            <td>João Silva</td>
                            <td>
                                <span class="badge bg-light text-primary border">
                                    <i class="fa-solid fa-phone me-1"></i> Chamada
                                </span>
                            </td>
                            <td>
                                <div class="text-truncate" style="max-width: 250px;">
                                    Follow-up sobre a proposta da Licença Pro.
                                </div>
                            </td>
                            <td><span class="badge bg-warning text-dark">Pendente</span></td>
                            <td class="text-end pe-4">
                                <button class="btn btn-sm btn-outline-success" title="Concluir"><i class="fa-solid fa-check"></i></button>
                                <button class="btn btn-sm btn-light text-primary"><i class="fa-solid fa-pen"></i></button>
                            </td>
                        </tr>
                        <tr>
                            <td class="ps-4">
                                <div class="fw-bold">23/04/2026</div>
                                <small class="text-muted">09:00</small>
                            </td>
                            <td>Maria Oliveira</td>
                            <td>
                                <span class="badge bg-light text-info border">
                                    <i class="fa-solid fa-video me-1"></i> Reunião
                                </span>
                            </td>
                            <td>
                                <div class="text-truncate" style="max-width: 250px;">
                                    Apresentação da automação de planilhas.
                                </div>
                            </td>
                            <td><span class="badge bg-success">Concluída</span></td>
                            <td class="text-end pe-4">
                                <button class="btn btn-sm btn-light text-primary"><i class="fa-solid fa-pen"></i></button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalNovaInteracao" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-md">
        <div class="modal-content border-0 shadow">
            <div class="modal-header border-bottom-0 pt-4 px-4">
                <h5 class="modal-title fw-bold">Agendar Interação</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <form id="formInteracao">
                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label small fw-bold">Cliente</label>
                            <select class="form-select" required>
                                <option selected disabled>Selecionar cliente...</option>
                                <option>João Silva</option>
                                <option>Maria Oliveira</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">Data</label>
                            <input type="date" class="form-control" value="2026-04-24">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">Horário</label>
                            <input type="time" class="form-control" value="14:30">
                        </div>
                        <div class="col-12">
                            <label class="form-label small fw-bold">Tipo de Contato</label>
                            <div class="d-flex gap-2 flex-wrap">
                                <input type="radio" class="btn-check" name="tipo" id="tipo1" checked>
                                <label class="btn btn-outline-secondary btn-sm" for="tipo1">Chamada</label>
                                
                                <input type="radio" class="btn-check" name="tipo" id="tipo2">
                                <label class="btn btn-outline-secondary btn-sm" for="tipo2">Reunião</label>
                                
                                <input type="radio" class="btn-check" name="tipo" id="tipo3">
                                <label class="btn btn-outline-secondary btn-sm" for="tipo3">WhatsApp</label>
                            </div>
                        </div>
                        <div class="col-12">
                            <label class="form-label small fw-bold">Notas / Objetivo</label>
                            <textarea class="form-control" rows="3" placeholder="O que será discutido?"></textarea>
                        </div>
                        <div class="col-12 mt-4 d-flex justify-content-end gap-2">
                            <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancelar</button>
                            <button type="submit" class="btn btn-primary px-4">Agendar</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
