<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyCRM | Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #f8f9fa;
        }

        /* Estilização da Sidebar */
        #sidebar {
            min-width: 250px;
            max-width: 250px;
            min-height: 100vh;
            background-color: #ffffff;
            color: #333;
            transition: all 0.3s;
            border-right: 1px solid #dee2e6;
        }

        .sidebar-header {
            padding: 20px;
            font-size: 1.25rem;
            font-weight: bold;
            color: #0d6efd;
            border-bottom: 1px solid #f8f9fa;
        }

        .nav-link {
            padding: 12px 20px;
            color: #555;
            display: flex;
            align-items: center;
            transition: 0.2s;
            border-radius: 0;
            font-weight: 500;
        }

        .nav-link i {
            width: 25px;
            margin-right: 10px;
            font-size: 1.1rem;
        }

        .nav-link:hover {
            background-color: #f0f7ff;
            color: #0d6efd;
        }

        .nav-link.active {
            background-color: #0d6efd;
            color: #fff;
        }

        .nav-link.logout {
            color: #dc3545;
            margin-top: auto;
        }

        .nav-link.logout:hover {
            background-color: #fff5f5;
            color: #dc3545;
        }

        /* Ajuste para layout principal */
        .wrapper {
            display: flex;
            width: 100%;
            align-items: stretch;
        }

        #content {
            width: 100%;
            padding: 20px;
        }

        /* Responsividade para telas pequenas */
        @media (max-width: 768px) {
            #sidebar {
                margin-left: -250px;
            }
            #sidebar.active {
                margin-left: 0;
            }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <nav id="sidebar" class="d-flex flex-column">
        <div class="sidebar-header d-flex align-items-center">
            <i class="fa-solid fa-chart-line me-2"></i> EasyCRM
        </div>

        <ul class="nav flex-column mb-auto mt-3">
            <li class="nav-item">
                <a href="#" class="nav-link active">
                    <i class="fa-solid fa-users"></i> Clientes
                </a>
            </li>
            <li class="nav-item">
                <a href="#" class="nav-link">
                    <i class="fa-solid fa-box"></i> Produtos
                </a>
            </li>
            <li class="nav-item">
                <a href="#" class="nav-link">
                    <i class="fa-solid fa-cart-shopping"></i> Vendas
                </a>
            </li>
            <li class="nav-item">
                <a href="#" class="nav-link">
                    <i class="fa-solid fa-comments"></i> Interações
                </a>
            </li>
            <li class="nav-item mt-4 border-top pt-2">
                <a href="#" class="nav-link">
                    <i class="fa-solid fa-user-gear"></i> Meu Perfil
                </a>
            </li>
        </ul>

        <div class="border-top">
            <a href="#" class="nav-link logout">
                <i class="fa-solid fa-right-from-bracket"></i> Logout
            </a>
        </div>
    </nav>

    <div id="content">
        <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom mb-4 d-md-none">
            <div class="container-fluid">
                <button type="button" id="sidebarCollapse" class="btn btn-outline-primary">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <span class="ms-3 fw-bold">EasyCRM</span>
            </div>
        </nav>

        <div class="container-fluid">
            <h2>Bem-vindo ao EasyCRM</h2>
            <p>Selecione uma opção no menu lateral para começar.</p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.getElementById('sidebarCollapse')?.addEventListener('click', function() {
        document.getElementById('sidebar').classList.toggle('active');
    });
</script>

</body>
</html>
