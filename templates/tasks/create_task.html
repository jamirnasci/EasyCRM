<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Create Task</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{url_for('static', filename='/css/global.css')}}">
</head>

<body>
    {% include 'components/side_bar.html' %}
    <div class="page-content">
        <h3>New Task</h3>
        <form class="w-50" method="POST" action="/create-task">

            <div class="mb-3">
                <label for="title" class="form-label">Title</label>
                <input type="text" class="form-control" id="title" name="title" placeholder="Título da tarefa" required>
            </div>

            <div class="mb-3">
                <label for="due_date" class="form-label">Due date</label>
                <input type="date" class="form-control" id="due_date" name="due_date" required>
            </div>

            <div class="mb-3">
                <label for="status" class="form-label">Status</label>
                <select class="form-select" id="status" name="status" required>
                    <option value="pending" selected>Pending</option>
                    <option value="completed">Completed</option>
                </select>
            </div>

            <div class="mb-3">
                <label for="client_id" class="form-label">Client</label>
                <select class="form-select" name="client_id" id="client_id">
                    {% for c in clients %}
                        <option value="{{ c.id }}">{{ c.name }} - {{ c.email }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label for="description" class="form-label">Description</label>
                <textarea class="form-control" id="description" name="description" rows="4"
                    placeholder="Descreva a tarefa..."></textarea>
            </div>
            <button type="submit" class="btn btn-primary w-100">Create Task</button>
        </form>
    </div>
</body>

</html>
