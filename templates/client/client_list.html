<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client list</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{url_for('static', filename='/css/global.css')}}">
</head>

<body>
    {% include 'components/side_bar.html' %}
    <div class="page-content">
        <div class="table-container w-75">
            <h3>Client List</h3>
            <div class="d-flex">
                <input class="form-control" type="text" name="client_name" id="client_name">
                <button class="btn btn-outline-primary ms-1">Search</button>
            </div>
            <table class="table table-light table-striped mt-1">
                <thead>
                    <tr>
                        <th scope="col">Name</th>
                        <th scope="col">Email</th>
                        <th scope="col">Phone</th>
                        <th scope="col">Status</th>
                        <th scope="col">Created At</th>
                        <th scope="col">Action</th>
                    </tr>
                </thead>
                <tbody>
                    {% for c in clients %}
                    <tr>
                        <th>{{ c.name }}</th>
                        <td>{{ c.email }}</td>
                        <td>{{ c.phone }}</td>
                        <td>{{ c.status }}</td>
                        <td>{{ c.created_at }}</td>
                        <td scope="col"><a class="text-success" href="/client-details/{{ c.id }}">Open</a></td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>

</html>
