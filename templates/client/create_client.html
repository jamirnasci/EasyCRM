<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Client</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="{{url_for('static', filename='/css/global.css')}}">
</head>

<body>
    {% include 'components/side_bar.html' %}
    <div class="page-content">
        <div class="p-3">
            <h3>Create Client</h3>
            <form method="POST" action="/create-client" class="w-50">
                <div class="mb-3">
                    <label for="name" class="form-label">Nome completo</label>
                    <input type="text" class="form-control form-control-sm" id="name" name="name"
                        placeholder="Nome do cliente" required>
                </div>

                <div class="mb-3 d-flex">
                    <div>
                        <label for="email" class="form-label">E-mail</label>
                        <input type="email" class="form-control form-control-sm" id="email" name="email"
                        placeholder="email@cliente.com" required>
                    </div>
                    <div class="ms-2">
                        <label for="phone" class="form-label">Telefone</label>
                        <input type="tel" class="form-control form-control-sm" id="phone" name="phone"
                            placeholder="(00) 00000-0000">
                    </div>
                </div>
                <div class="mb-3">
                    <label for="status">Status</label>
                    <select class="form-select form-select-sm" name="status" id="status">
                        <option value="lead">Lead</option>
                        <option value="opportunity">Opportunity</option>
                        <option value="client">Client</option>
                        <option value="lost">Lost</option>
                    </select>
                </div>

                <div class="mb-3 d-flex">
                    <div>

                        <label for="company" class="form-label">Empresa</label>
                        <input type="text" class="form-control form-control-sm" id="company" name="company"
                            placeholder="Nome da empresa">
                    </div>
                    <div class="ms-2">
                        <label class="form-label" for="position">Position</label>
                        <input class="form-control form-control-sm" type="text" name="position" id="position">
                    </div>
                </div>

                <div class="mb-3">
                    <label for="notes" class="form-label">Observações</label>
                    <textarea class="form-control form-control-sm" id="notes" name="notes" rows="3"
                        placeholder="Informações adicionais..."></textarea>
                </div>

                <button type="submit" class="btn btn-success">Cadastrar Cliente</button>
            </form>
        </div>
    </div>
</body>

</html>
